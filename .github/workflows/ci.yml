name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install PostgreSQL server tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql
          echo "$(dirname "$(find /usr/lib/postgresql -type f -name pg_ctl | head -1)")" >> "$GITHUB_PATH"

      - name: Install test dependencies
        run: python -m pip install -e '.[test]'

      - name: Check formatting and lint
        run: ruff check .

      - name: Run tests
        run: GAH_REQUIRE_POSTGRES=1 pytest -q

      - name: Check patch hygiene
        run: git diff --check
